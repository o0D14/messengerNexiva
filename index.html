<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexiva Web</title>
    <!-- Подключаем библиотеку Socket.IO для браузера -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; height: 100vh; background-color: #f0f2f5; }
        
        /* Экран входа */
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 300px; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .login-box button { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        
        /* Главный интерфейс */
        #app { display: none; width: 100%; height: 100%; }
        
        /* Левая панель (Пользователи) */
        .sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #f8f9fa; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 18px;}
        .user-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .user-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; }
        .user-item:hover { background: #f0f0f0; }
        .user-item.active { background: #e6f2ff; }
        .online-dot { width: 10px; height: 10px; background: #34c759; border-radius: 50%; margin-right: 10px; }
        
        /* Правая панель (Чат) */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #e5e5ea; }
        .chat-header { padding: 20px; background: white; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between;}
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Пузыри сообщений */
        .msg { max-width: 60%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg-mine { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-other { background: white; color: black; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right; }
        
        /* Ввод сообщения */
        .input-area { padding: 15px 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd;}
        .input-area input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 20px; font-size: 15px; outline: none; }
        .input-area button { padding: 0 20px; background: #007aff; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold;}
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
        
        #empty-state { flex: 1; display: flex; justify-content: center; align-items: center; color: #888; font-size: 18px; }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Вход в Nexiva Web</h2>
            <input type="text" id="input-name" placeholder="Ваше Имя (например, Web User)">
            <input type="text" id="input-username" placeholder="Ваш @username (например, @web1)">
            <button onclick="login()">Войти в сеть</button>
        </div>
    </div>

    <!-- Главный интерфейс -->
    <div id="app">
        <!-- Список онлайна -->
        <div class="sidebar">
            <div class="sidebar-header">Люди в сети</div>
            <ul class="user-list" id="users-list">
                <!-- Сюда JS добавит пользователей -->
            </ul>
        </div>

        <!-- Зона переписки -->
        <div class="chat-area" id="chat-area" style="display: none;">
            <div class="chat-header">
                <span id="chat-title">Чат</span>
                <span style="color: #888; font-size: 14px;">Nexiva</span>
            </div>
            <div class="messages" id="messages-container">
                <!-- Сюда JS добавит сообщения -->
            </div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Написать сообщение..." onkeypress="handleEnter(event)">
                <button id="send-btn" onclick="sendMessage()">Отправить</button>
            </div>
        </div>
        
        <!-- Заглушка, когда не выбран чат -->
        <div id="empty-state">
            Выберите пользователя слева, чтобы начать чат
        </div>
    </div>

    <script>
        // 1. ПОДКЛЮЧАЕМСЯ К ТВОЕМУ СЕРВЕРУ
        const socket = io('http://192.168.1.102:3000');
        
        let myName = "";
        let myUsername = "";
        let currentChatUser = null; // С кем сейчас открыт чат
        let currentRoomId = "";     // ID комнаты
        let allMessages = [];       // Все сообщения с сервера

        // Логика входа
        function login() {
            const nameInput = document.getElementById('input-name').value.trim();
            const usernameInput = document.getElementById('input-username').value.trim();
            
            if (!nameInput || !usernameInput) {
                alert("Заполните оба поля!");
                return;
            }
            
            myName = nameInput;
            myUsername = usernameInput.startsWith('@') ? usernameInput : '@' + usernameInput;
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            
            // Сообщаем серверу, что веб-клиент вошел в сеть!
            socket.emit('user_joined', { name: myName, username: myUsername });
        }

        // 2. СЛУШАЕМ СЕРВЕР

        // Сервер прислал список людей в сети
        socket.on('online_users', (users) => {
            const list = document.getElementById('users-list');
            list.innerHTML = ''; // Очищаем список
            
            users.forEach(user => {
                // Себя не показываем
                if (user.username === myUsername) return;
                
                const li = document.createElement('li');
                li.className = 'user-item';
                // Если этот юзер сейчас открыт, подсвечиваем его
                if (currentChatUser && currentChatUser.username === user.username) {
                    li.classList.add('active');
                }
                
                li.innerHTML = `
                    <div class="online-dot"></div>
                    <div>
                        <div style="font-weight: bold;">${user.name}</div>
                        <div style="font-size: 12px; color: #888;">${user.username}</div>
                    </div>
                `;
                
                // При клике на юзера - открываем с ним чат
                li.onclick = () => openChat(user);
                list.appendChild(li);
            });
        });

        // Сервер прислал историю
        socket.on('load_history', (history) => {
            allMessages = history;
            if (currentChatUser) renderMessages();
        });

        // Сервер прислал новое сообщение (от кого угодно)
        socket.on('receive_message', (msg) => {
            // Игнорируем системные команды (звонки, заморозки)
            if (msg.text.startsWith('SYS_')) return;
            
            // Добавляем в общую базу
            if (!allMessages.find(m => m.id === msg.id)) {
                allMessages.push(msg);
                
                // Если мы сейчас сидим в этом чате - перерисовываем
                if (currentChatUser && msg.chatId === currentRoomId) {
                    renderMessages();
                    
                    // Звук уведомления на компе (если страница открыта)
                    if (msg.senderId !== myUsername) {
                        new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(()=>{});
                    }
                }
            }
        });

        // 3. ЛОГИКА ИНТЕРФЕЙСА

        // Функция генерации ID чата (ТАКАЯ ЖЕ КАК В SWIFT!)
        function generatePrivateChatId(user1, user2) {
            return [user1, user2].sort().join('_');
        }

        function openChat(user) {
            currentChatUser = user;
            currentRoomId = generatePrivateChatId(myUsername, user.username);
            
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
            document.getElementById('chat-title').innerText = user.name;
            
            // Подсвечиваем в списке
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = '';
            
            // Фильтруем сообщения только для текущей комнаты
            const chatMsgs = allMessages.filter(m => m.chatId === currentRoomId && !m.text.startsWith('SYS_'));
            
            chatMsgs.forEach(msg => {
                const isMine = msg.senderId === myUsername;
                const div = document.createElement('div');
                div.className = `msg ${isMine ? 'msg-mine' : 'msg-other'}`;
                
                const date = new Date(msg.timestamp);
                const time = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                
                div.innerHTML = `
                    <div>${msg.text} ${msg.effect ? msg.effect : ''}</div>
                    <div class="msg-time">${time}</div>
                `;
                container.appendChild(div);
            });
            
            // Прокрутка вниз
            container.scrollTop = container.scrollHeight;
        }

        // 4. ОТПРАВКА СООБЩЕНИЯ
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            
            if (!text || !currentChatUser) return;
            
            const newId = crypto.randomUUID();
            const timestamp = new Date().toISOString();
            
            const data = {
                id: newId,
                chatId: currentRoomId,
                text: text,
                senderId: myUsername,
                effect: "",
                customColor: "",
                isSilent: false,
                timestamp: timestamp
            };
            
            // Отправляем на сервер Node.js
            socket.emit('send_message', data);
            
            // Рисуем у себя (оптимистичный UI)
            const myMsg = { ...data, isMine: true };
            allMessages.push(myMsg);
            renderMessages();
            
            input.value = '';
            input.focus();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
